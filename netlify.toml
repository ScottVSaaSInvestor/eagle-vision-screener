[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ══════════════════════════════════════════════════════════════════════════════
# REQUIRED ENVIRONMENT VARIABLES (set in Netlify → Site Settings → Env Vars)
# ══════════════════════════════════════════════════════════════════════════════
# ANTHROPIC_API_KEY   = sk-ant-...  (your Anthropic key — REQUIRED)
# TAVILY_API_KEY      = tvly-...   (for web search — REQUIRED)
# ACCESS_PASSCODE     = yourpass   (gate the app — REQUIRED)
#
# ANTHROPIC_MODEL     = claude-sonnet-4-5-20250929
#   ↑ THIS IS THE FIX FOR THE 1-MINUTE TIMEOUT ERROR ↑
#   The default model (claude-opus-4-5) takes 40-90s per pack call.
#   Netlify's hard limit is 26s → every pack times out → all packs return failed.
#   Setting ANTHROPIC_MODEL=claude-sonnet-4-5-20250929 fixes this:
#     - Sonnet generates structured JSON packs in 8-15s (well within 26s)
#     - Quality is nearly identical for structured JSON extraction tasks
#     - Each pack has a 3-attempt fallback: Sonnet → Sonnet(shorter) → Haiku
#   DO NOT use claude-opus-4-5 unless you are on Netlify Pro with 60s+ timeouts.
# ══════════════════════════════════════════════════════════════════════════════

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pdf-parse"]

# ── AI Pack Functions (heavy Claude calls — 26s timeout) ──────────────────────
[functions."pack-company-profile"]
  timeout = 26

[functions."pack-competitive-landscape"]
  timeout = 26

[functions."pack-team-capability"]
  timeout = 26

[functions."pack-regulatory-moat"]
  timeout = 26

[functions."pack-workflow-product"]
  timeout = 26

[functions."pack-data-architecture"]
  timeout = 26

[functions."pack-market-timing"]
  timeout = 26

# ── Research Functions (web I/O — 26s timeout) ────────────────────────────────
[functions."research-search"]
  timeout = 26

[functions."research-crawl"]
  timeout = 26

# ── New Deep Research Functions (Claude synthesis calls — 26s timeout) ────────
[functions."research-gap-fill"]
  timeout = 26

[functions."research-synthesize"]
  timeout = 26

# ── Auth & Document Functions ─────────────────────────────────────────────────
[functions."auth-check"]
  timeout = 10

[functions."document-parse"]
  timeout = 26

[functions."diagnose"]
  timeout = 26

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  publish = "dist"
  autoLaunch = false
